<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cliGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="s3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="ec2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="instGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#334155"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="outGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="38" fill="#f1f5f9" font-size="20" font-weight="700" text-anchor="middle">k6-ec2 Architecture</text>

  <!-- ===== k6-ec2 CLI Box ===== -->
  <rect x="40" y="70" width="160" height="90" rx="10" fill="url(#cliGrad)" filter="url(#shadow)"/>
  <text x="120" y="108" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">k6-ec2</text>
  <text x="120" y="130" fill="#c7d2fe" font-size="12" text-anchor="middle">CLI Orchestrator</text>

  <!-- ===== Amazon S3 Box ===== -->
  <rect x="320" y="70" width="170" height="90" rx="10" fill="url(#s3Grad)" filter="url(#shadow)"/>
  <text x="405" y="108" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">Amazon S3</text>
  <text x="405" y="130" fill="#bbf7d0" font-size="12" text-anchor="middle">Test Scripts</text>

  <!-- Arrow: CLI -> S3 -->
  <line x1="200" y1="115" x2="315" y2="115" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>
  <text x="258" y="105" fill="#86efac" font-size="10" text-anchor="middle" font-weight="600">1. Upload script</text>

  <!-- ===== EC2 Instances Group ===== -->
  <rect x="570" y="60" width="290" height="380" rx="12" fill="#1e293b" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <rect x="570" y="60" width="290" height="36" rx="12" fill="url(#ec2Grad)"/>
  <rect x="570" y="84" width="290" height="12" fill="url(#ec2Grad)"/>
  <text x="715" y="84" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">EC2 Instances</text>

  <!-- Instance 0 -->
  <rect x="600" y="112" width="230" height="64" rx="8" fill="url(#instGrad)" stroke="#475569" stroke-width="1"/>
  <circle cx="622" cy="136" r="8" fill="#6366f1"/>
  <text x="622" y="140" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">0</text>
  <text x="648" y="134" fill="#e2e8f0" font-size="13" font-weight="600">Instance 0</text>
  <text x="648" y="154" fill="#94a3b8" font-size="11">k6 runner</text>
  <rect x="770" y="126" width="50" height="22" rx="4" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="795" y="141" fill="#60a5fa" font-size="9" font-weight="600" text-anchor="middle">On-Dem</text>

  <!-- Instance 1 -->
  <rect x="600" y="190" width="230" height="64" rx="8" fill="url(#instGrad)" stroke="#475569" stroke-width="1"/>
  <circle cx="622" cy="214" r="8" fill="#6366f1"/>
  <text x="622" y="218" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">1</text>
  <text x="648" y="212" fill="#e2e8f0" font-size="13" font-weight="600">Instance 1</text>
  <text x="648" y="232" fill="#94a3b8" font-size="11">k6 runner</text>
  <rect x="770" y="204" width="50" height="22" rx="4" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="795" y="219" fill="#60a5fa" font-size="9" font-weight="600" text-anchor="middle">On-Dem</text>

  <!-- Instance N -->
  <rect x="600" y="268" width="230" height="64" rx="8" fill="url(#instGrad)" stroke="#475569" stroke-width="1"/>
  <circle cx="622" cy="292" r="8" fill="#f97316"/>
  <text x="622" y="296" fill="#fff" font-size="9" font-weight="700" text-anchor="middle">N</text>
  <text x="648" y="290" fill="#e2e8f0" font-size="13" font-weight="600">Instance N</text>
  <text x="648" y="310" fill="#94a3b8" font-size="11">k6 runner</text>
  <rect x="770" y="282" width="50" height="22" rx="4" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="795" y="297" fill="#fb923c" font-size="9" font-weight="600" text-anchor="middle">Spot</text>

  <!-- Ellipsis dots between instances -->
  <circle cx="715" cy="350" r="3" fill="#64748b"/>
  <circle cx="715" cy="362" r="3" fill="#64748b"/>
  <circle cx="715" cy="374" r="3" fill="#64748b"/>

  <!-- SSM label inside group -->
  <text x="715" y="420" fill="#94a3b8" font-size="10" text-anchor="middle" font-style="italic">Managed via SSM Run Command</text>

  <!-- Arrow: CLI -> EC2 (Launch instances) -->
  <path d="M 200 140 L 280 200 L 565 200" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="340" y="192" fill="#fdba74" font-size="10" font-weight="600">2. Launch instances</text>

  <!-- Arrow: CLI -> EC2 (SSM Run Command) -->
  <path d="M 200 145 L 280 260 L 565 260" fill="none" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="340" y="252" fill="#fdba74" font-size="10" font-weight="600">3. SSM Run Command</text>

  <!-- ===== Steps on the left ===== -->
  <rect x="40" y="200" width="200" height="195" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1" filter="url(#shadow)"/>
  <text x="140" y="225" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">Execution Flow</text>
  <line x1="55" y1="235" x2="225" y2="235" stroke="#334155" stroke-width="1"/>

  <circle cx="68" cy="260" r="10" fill="#22c55e"/>
  <text x="68" y="264" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">1</text>
  <text x="88" y="264" fill="#94a3b8" font-size="11">Upload script to S3</text>

  <circle cx="68" cy="290" r="10" fill="#f97316"/>
  <text x="68" y="294" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">2</text>
  <text x="88" y="294" fill="#94a3b8" font-size="11">Launch EC2 instances</text>

  <circle cx="68" cy="320" r="10" fill="#f97316"/>
  <text x="68" y="324" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">3</text>
  <text x="88" y="324" fill="#94a3b8" font-size="11">SSM Run Command</text>

  <circle cx="68" cy="350" r="10" fill="#3b82f6"/>
  <text x="68" y="354" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">4</text>
  <text x="88" y="354" fill="#94a3b8" font-size="11">Stream CW logs</text>

  <circle cx="68" cy="380" r="10" fill="#ef4444"/>
  <text x="68" y="384" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">5</text>
  <text x="88" y="384" fill="#94a3b8" font-size="11">Terminate instances</text>

  <!-- ===== Output: stdout ===== -->
  <rect x="40" y="430" width="200" height="55" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="455" fill="#a5b4fc" font-size="11" font-weight="600" text-anchor="middle">Summary</text>
  <text x="140" y="473" fill="#e2e8f0" font-size="13" font-weight="700" text-anchor="middle">→ stdout</text>

  <!-- Arrow: flow -> stdout -->
  <line x1="140" y1="395" x2="140" y2="425" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- ===== Output: Datadog / InfluxDB ===== -->
  <rect x="610" y="470" width="220" height="55" rx="10" fill="url(#outGrad)" filter="url(#shadow)"/>
  <text x="720" y="496" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Datadog / InfluxDB</text>
  <text x="720" y="514" fill="#ddd6fe" font-size="11" text-anchor="middle">Metrics Backend</text>

  <!-- Arrow: EC2 -> Datadog/InfluxDB -->
  <line x1="715" y1="440" x2="715" y2="465" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Arrow: CLI <- CW Logs (step 4) -->
  <path d="M 565 340 L 280 340 L 200 300" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowWhite)"/>
  <text x="390" y="334" fill="#93c5fd" font-size="10" font-weight="600">4. Stream CloudWatch logs</text>

  <!-- Footer -->
  <text x="450" y="560" fill="#475569" font-size="10" text-anchor="middle">k6-ec2 — Distributed k6 Load Testing on AWS EC2</text>
</svg>